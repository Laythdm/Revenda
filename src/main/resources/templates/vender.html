<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>Vender - Revenda</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <div class="app">
    <div th:replace="fragments/sidebar :: sidebar('vender')"></div>

    <div class="main">
      <div th:replace="fragments/topbar :: topbar('Registrar venda')"></div>

      <main class="content">
        <section class="card">
          <div class="card-header">
            <div>
              <h2 class="h2">Venda</h2>
              <p class="muted">Selecione um veículo disponível e preencha os dados do cliente.</p>
            </div>
          </div>

          <div class="card-body">
            <div th:if="${#lists.isEmpty(carrosDisponiveis)}" class="muted">
              Nenhum veículo disponível no momento.
            </div>

            <form th:if="${!#lists.isEmpty(carrosDisponiveis)}" th:action="@{/vendas/confirmar}" method="POST" class="form">
              <div class="grid-2">
                <div class="form-group">
                  <label for="carroId">Veículo</label>
                  <select id="carroId" name="carroId" class="select">
                    <option th:each="c : ${carrosDisponiveis}"
                            th:value="${c.id}"
                            th:selected="${carroSelecionado} != null and ${carroSelecionado} == ${c.id}"
                            th:text="${c.id + ' - ' + c.marca + ' ' + c.modelo + ' (' + c.ano + ') - ' + c.cor}">
                    </option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="metodoPagamento">Método de pagamento</label>
                  <select id="metodoPagamento" name="metodoPagamento" class="select">
                    <option value="Pix">Pix</option>
                    <option value="Cartão de crédito">Cartão de crédito</option>
                    <option value="Cartão de débito">Cartão de débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Transferência">Transferência</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="valor">Valor da venda</label>
                  <input type="number" step="0.01" min="0" id="valor" name="valor" class="input" placeholder="Ex: 45000.00" required />
                </div>

                <div class="form-group">
                  <label for="nome">Nome do cliente</label>
                  <input type="text" id="nome" name="nome" class="input" placeholder="Ex: Maria Silva" required />
                </div>

                <div class="form-group">
                  <label for="cpf">CPF</label>
                  <input type="text" id="cpf" name="cpf" class="input" placeholder="Somente números" required />
                </div>

                <div class="form-group">
                  <label for="rg">RG</label>
                  <input type="text" id="rg" name="rg" class="input" placeholder="Ex: 12345678" required />
                </div>

                <div class="form-group">
                  <label for="numero">Número (telefone)</label>
                  <input type="text" id="numero" name="numero" class="input" placeholder="Ex: (51) 99999-9999" required />
                </div>
              </div>

              <div class="actions">
                <a class="btn btn-ghost" th:href="@{/lista}">Cancelar</a>
                <button type="submit" class="btn btn-primary">Confirmar venda</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>

</html>
