<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
  <aside class="sidebar" th:fragment="sidebar(ativo)">
    <div class="brand">
      <div class="logo">R</div>
      <div>
        <div class="brand-title">Revenda</div>
        <div class="brand-sub">Sistema interno</div>
      </div>
    </div>

    <nav class="nav">
      <a th:href="@{/dashboard}" th:classappend="${ativo} == 'dashboard' ? ' active' : ''">Dashboard</a>
      <a th:href="@{/index}" th:classappend="${ativo} == 'menu' ? ' active' : ''">Menu</a>
      <a th:href="@{/lista}" th:classappend="${ativo} == 'lista' ? ' active' : ''">Estoque de carros</a>

      <span sec:authorize="hasRole('VENDEDOR')">
        <a th:href="@{/vendas/nova}" th:classappend="${ativo} == 'vender' ? ' active' : ''">Vender</a>
      </span>

      <span sec:authorize="hasRole('GERENTE')">
        <a th:href="@{/criarCarroForm}" th:classappend="${ativo} == 'cadastro' ? ' active' : ''">Cadastrar carro</a>
        <a th:href="@{/vendas/historico}" th:classappend="${ativo} == 'historico' ? ' active' : ''">Histórico de vendas</a>
      </span>

      <a th:href="@{/logout}" class="danger">Sair</a>
    </nav>

    <div class="sidebar-footer">
      <div class="small">Logado como: <b sec:authentication="name"></b></div>
      <div class="small">Perfil: <b sec:authentication="authorities"></b></div>
    </div>
  </aside>
</body>
</html>
