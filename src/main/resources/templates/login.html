<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="css/style.css" rel="stylesheet" type="text/css"/>
</head>

<body>
  <div class="informacoes">
   
    <form th:action="@{/login}" method="post">
      <h3>Login do sistema</h3>

      <p th:if="${param.error}" style="color:red;">Login ou senha inválidos.</p>
      <p th:if="${param.logout}" style="color:green;">Você saiu do sistema.</p>

      <div class="form-group">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" placeholder="gerente ou vendedor"/>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" placeholder="123"/>
      </div>

      <button type="submit">Entrar</button>

      <p style="margin-top:10px;">
        <b>Usuários de teste:</b><br/>
        gerente / 123<br/>
        vendedor / 123
      </p>
    </form>
  </div>
</body>
</html>
